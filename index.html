<!DOCTYPE html>
<html>
<head>
    <title>Get Well Soon ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

    <h1>🐶 Catch the Naughty Dog!</h1>
    <p>Tap the dog to collect bandages 🩹</p>

    <h2>Score: <span id="score">0</span>/15</h2>

    <div id="dog">🐕</div>

</div>

<div id="messageBox">
    <div id="messageCard">
        <h1>🌸 Get Well Soon 🌸</h1>
        <p>
            You did it ❤️<br><br>
            I hope you heal fast and feel better soon.<br>
            I'm always with you 🫂
        </p>
        <button onclick="location.reload()">Play Again 🐶</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
